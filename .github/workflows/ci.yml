name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: AD-002 framework import guard
        run: |
          set -euo pipefail
          matches=$(rg -l "from ['\"]playwright|from ['\"]@playwright/|selenium-webdriver|cypress|webdriverio" \
            apps packages \
            --glob '!packages/adapter-*' \
            --glob '!**/node_modules/**' \
            2>/dev/null || true)
          if [ -n "$matches" ]; then
            echo "::error::Framework SDK import detected outside packages/adapter-*"
            echo "$matches"
            exit 1
          fi
          echo "AD-002 guard passed"
