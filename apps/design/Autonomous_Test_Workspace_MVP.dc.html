    <div style={{display:'flex',alignItems:'center',gap:6,padding:'3px 8px 3px '+pad+'px',borderRadius:5,cursor:'pointer',color:isFolder?'var(--t1)':color}} onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
      {isFolder?<V d={node.open?IC.chevD:IC.chev} s={12} stroke="var(--t2)"/>:<span style={{width:12}}/>}
      <V d={isFolder?(node.open?IC.folderOpen:IC.folder):IC.file} s={14} stroke={isFolder?'var(--t2)':color}/>
      <span style={{fontSize:12,fontFamily:'var(--mono)',fontWeight:isFolder?600:400,flex:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{node.name}</span>

      {node.mod&&<span style={{fontSize:10,fontWeight:700,color:'var(--mod)',fontFamily:'var(--mono)'}}>M</span>}
    </div>
  );
}
function Section({icon,title,right,open,onToggle,children}){

function Workspace({go,project,notify,gitChanges,setGitChanges,setRuns,setLastRun}){
  const [centerTab,setCenterTab]=useState('browser');
  const [studioView,setStudioView]=useState('semantic');
  const [prompt,setPrompt]=useState('');
  const [phase,setPhase]=useState('idle'); // idle|thinking|streaming|proposed
  const [steps,setSteps]=useState([]); // revealed CHECKOUT_STEPS
  const [applied,setApplied]=useState(false);
  const [bottomTab,setBottomTab]=useState('reasoning');
  const [logs,setLogs]=useState([]);
  const [hl,setHl]=useState(-1); // browser highlight index
  const [exec,setExec]=useState({phase:'idle',steps:[],result:null,active:-1});
  const [commitOpen,setCommitOpen]=useState(false);
  const [committed,setCommitted]=useState(false);
  const [panels,setPanels]=useState({left:true,right:true,bottom:true});
  const [secOpen,setSecOpen]=useState({repo:true,fw:true,sem:false,git:true});
  const logRef=useRef(null);
  const timers=useRef([]);
  useEffect(()=>()=>timers.current.forEach(clearTimeout),[]);
  useEffect(()=>{if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight;},[logs]);
  const addLog=(l)=>setLogs(prev=>[...prev,l]);

  const generate=(text)=>{
    const q=(text||prompt).trim(); if(!q||phase==='thinking'||phase==='streaming')return;
    timers.current.forEach(clearTimeout); timers.current=[];
    setPrompt(q); setPhase('thinking'); setSteps([]); setApplied(false); setExec({phase:'idle',steps:[],result:null,active:-1});
    setLogs([]); setBottomTab('reasoning'); setCenterTab('browser'); setHl(-1);
    const T=(fn,ms)=>timers.current.push(setTimeout(fn,ms));
    addLog({t:'ai',m:'Reading repository context — CheckoutPage.java, CartPage.java, TestBase.java'});
    T(()=>addLog({t:'ai',m:'Matched conventions: JUnit5 · Page Object Model · Playwright Java 1.48'}),700);
    T(()=>addLog({t:'ai',m:'Mapping intent to existing page objects & locators…'}),1500);
    T(()=>setPhase('streaming'),2100);
    CHECKOUT_STEPS.forEach((s,i)=>{
      T(()=>{ setSteps(prev=>[...prev,s]); setHl(i); addLog({t:'step',m:'Step '+(i+1)+' · '+s.intent+'  ('+s.conf+'%)'}); },2300+i*640);
    });
    const end=2300+CHECKOUT_STEPS.length*640+300;
    T(()=>{ setPhase('proposed'); setHl(-1); addLog({t:'ok',m:'Draft ready — 6 semantic steps. Proposing file changes for review.'}); },end);
  };

  const apply=()=>{
    setApplied(true);
    setGitChanges([
      {file:'CheckoutFlowTest.java',path:'com.acme.tests',type:'A',reason:'New checkout flow test (6 semantic steps)'},
      {file:'CheckoutPage.java',path:'com.acme.pages',type:'M',reason:'Improved locator stability — role-based selectors'},
    ]);
    setSecOpen(s=>({...s,git:true}));
    addLog({t:'ok',m:'Applied to working tree. 1 file created, 1 modified. Review in Git Changes.'});
    notify('Changes applied to working tree — review before committing');
  };

  const run=()=>{
    setCenterTab('execution'); setBottomTab('logs');
    const base=CHECKOUT_STEPS.map(s=>({id:s.id,label:s.intent,status:'wait',dur:''}));
    setExec({phase:'running',steps:base,result:null,active:0});
    setLogs([]); addLog({t:'run',m:'$ mvn -Dtest=CheckoutFlowTest test'});
    timers.current.forEach(clearTimeout); timers.current=[];
    const T=(fn,ms)=>timers.current.push(setTimeout(fn,ms));
    const durs=['381ms','642ms','190ms','442ms','268ms','3.21s'];
    CHECKOUT_STEPS.forEach((s,i)=>{
      const last=i===CHECKOUT_STEPS.length-1;
      T(()=>{ setExec(e=>({...e,active:i,steps:e.steps.map((x,j)=>j===i?{...x,status:'running'}:x)})); addLog({t:'run',m:'▶ '+s.intent}); },500+i*820);
      T(()=>{
        const st=last?'fail':'pass';
        setExec(e=>({...e,steps:e.steps.map((x,j)=>j===i?{...x,status:st,dur:durs[i]}:x)}));
        addLog(last?{t:'err',m:'✗ POST /api/payments → HTTP 500 (expected 200)'}:{t:'ok',m:'✓ '+s.intent+'  '+durs[i]});
      },500+i*820+520);
    });
    const end=500+CHECKOUT_STEPS.length*820+200;
    T(()=>{
      setExec(e=>({...e,phase:'done',result:'fail',active:-1}));
      setBottomTab('reasoning');
      addLog({t:'err',m:'Run failed — 5/6 steps passed. AI classifying failure…'});
      const newRun={id:'r-3042',test:'CheckoutFlowTest',status:'fail',dur:'5.1s',steps:'5/6',when:'just now',branch:'main',reason:'Payment API 500'};
      setRuns(prev=>[newRun,...prev]); setLastRun(newRun);
    },end);
  };

  const reset=()=>{ setPrompt(''); setPhase('idle'); setSteps([]); setApplied(false); setExec({phase:'idle',steps:[],result:null,active:-1}); setGitChanges([]); setCommitted(false); setLogs([]); setCenterTab('browser'); };

  const fwShort='Playwright Java';
  const totalConf=steps.length?Math.round(steps.reduce((a,s)=>a+s.conf,0)/steps.length):0;

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:'var(--bg1)'}} data-screen-label="Workspace">
      {/* toolbar */}
      <div style={{height:40,borderBottom:'1px solid var(--b0)',background:'var(--bg0)',display:'flex',alignItems:'center',padding:'0 12px',gap:10,flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:7}}><GitMark source={project.source} s={14}/><span style={{fontSize:12.5,fontWeight:600,fontFamily:'var(--mono)'}}>{project.repo}</span></div>
        <button style={{display:'flex',alignItems:'center',gap:5,height:24,padding:'0 9px',background:'var(--bg2)',border:'1px solid var(--b1)',borderRadius:6,color:'var(--t1)',fontSize:11.5,fontFamily:'var(--mono)'}}><V d={IC.branch} s={12}/>{project.branch}<V d={IC.chevD} s={11}/></button>
        <button style={{display:'flex',alignItems:'center',gap:5,height:24,padding:'0 9px',background:'transparent',border:'1px solid var(--b1)',borderRadius:6,color:'var(--t1)',fontSize:11.5}}><V d={IC.sync} s={12}/>Synced</button>
        <AdapterBadge sm/>
        <div style={{flex:1}}/>
        {gitChanges.length>0&&!committed&&<button onClick={()=>setCommitOpen(true)} style={{display:'flex',alignItems:'center',gap:6,height:26,padding:'0 11px',background:'var(--bg2)',border:'1px solid var(--b2)',borderRadius:7,color:'var(--t0)',fontSize:12,fontWeight:600}}><V d={IC.git} s={13} stroke="var(--mod)"/>{gitChanges.length} changes</button>}
        <button onClick={run} disabled={exec.phase==='running'} style={{display:'flex',alignItems:'center',gap:6,height:26,padding:'0 13px',background:exec.phase==='running'?'var(--bg3)':'var(--ok)',border:'none',borderRadius:7,color:exec.phase==='running'?'var(--t2)':'#08130D',fontSize:12,fontWeight:700}}>{exec.phase==='running'?<><div style={{width:11,height:11,border:'2px solid var(--t2)',borderTopColor:'transparent',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>Running</>:<><V d={IC.run} s={12} fill="#08130D" stroke="none"/>Run</>}</button>
        <button style={{display:'flex',alignItems:'center',gap:6,height:26,padding:'0 11px',background:'var(--bg2)',border:'1px solid var(--b1)',borderRadius:7,color:'var(--t1)',fontSize:12,fontWeight:600}}><V d={IC.bug} s={13}/>Debug</button>
        <div style={{width:1,height:18,background:'var(--b1)'}}/>
        <button onClick={()=>setPanels(p=>({...p,left:!p.left}))} title="Toggle left" style={{width:26,height:26,border:'none',background:'transparent',color:panels.left?'var(--t1)':'var(--t3)',borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center'}}><V d={IC.sidebar} s={15}/></button>
        <button onClick={()=>setPanels(p=>({...p,bottom:!p.bottom}))} title="Toggle bottom" style={{width:26,height:26,border:'none',background:'transparent',color:panels.bottom?'var(--t1)':'var(--t3)',borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center'}}><V d={IC.panelB} s={15}/></button>
      </div>

      <div style={{flex:1,display:'flex',overflow:'hidden',minHeight:0}}>
        {/* LEFT */}
        {panels.left&&<div style={{width:248,flexShrink:0,borderRight:'1px solid var(--b0)',background:'var(--bg1)',display:'flex',flexDirection:'column',overflow:'hidden'}}>
          <div style={{flex:1,overflowY:'auto'}}>
            <Section icon={IC.folder} title="Repository" open={secOpen.repo} onToggle={()=>setSecOpen(s=>({...s,repo:!s.repo}))}>
              {FILE_TREE.map((n,i)=><FileTreeRow key={i} node={n}/>)}
            </Section>
            <Section icon={IC.layers} title="Framework" open={secOpen.fw} onToggle={()=>setSecOpen(s=>({...s,fw:!s.fw}))}>
              <div style={{padding:'4px 8px',display:'flex',flexDirection:'column',gap:8}}>
                <AdapterBadge/>
                <div style={{display:'flex',flexWrap:'wrap',gap:5}}>{['JUnit 5','Maven','Page Object Model','Allure'].map(t=><Pill key={t}>{t}</Pill>)}</div>
                <div style={{fontSize:11,color:'var(--t2)',lineHeight:'15px'}}>42 pages · 18 page objects · 12 utils · 187 tests indexed</div>
              </div>
            </Section>
            <Section icon={IC.spark} title="Semantic Tests" right={<Pill c="var(--acc)" bg="var(--accDim)" bd="rgba(91,140,239,0.25)">{SEMANTIC_TESTS.length}</Pill>} open={secOpen.sem} onToggle={()=>setSecOpen(s=>({...s,sem:!s.sem}))}>
              {SEMANTIC_TESTS.map((t,i)=>(<div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 8px',borderRadius:5}} onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <div style={{width:6,height:6,borderRadius:'50%',background:t.status==='draft'?'var(--mod)':'var(--ok)',flexShrink:0}}/>
                <span style={{flex:1,fontSize:11.5,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.name}</span>
                <span style={{fontSize:10,color:'var(--t2)',fontFamily:'var(--mono)'}}>{t.steps}</span>
              </div>))}
            </Section>
            <Section icon={IC.git} title="Git Changes" right={gitChanges.length>0&&<Pill c="var(--mod)" bg="var(--modDim)" bd="rgba(224,163,58,0.3)">{gitChanges.length}</Pill>} open={secOpen.git} onToggle={()=>setSecOpen(s=>({...s,git:!s.git}))}>
              {gitChanges.length===0
                ? <div style={{padding:'8px',fontSize:11.5,color:'var(--t2)',lineHeight:'16px'}}>Working tree clean. AI-proposed changes appear here for review before commit.</div>
                : <div style={{display:'flex',flexDirection:'column',gap:2}}>
                    {gitChanges.map((c,i)=>(<div key={i} style={{display:'flex',alignItems:'center',gap:7,padding:'5px 8px',borderRadius:5}} onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                      <span style={{width:14,fontSize:11,fontWeight:700,fontFamily:'var(--mono)',color:c.type==='A'?'var(--add)':'var(--mod)'}}>{c.type}</span>
                      <V d={IC.file} s={13} stroke={c.type==='A'?'var(--add)':'var(--mod)'}/>
                      <span style={{flex:1,fontSize:11.5,fontFamily:'var(--mono)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.file}</span>
                    </div>))}
                    {!committed&&<button onClick={()=>setCommitOpen(true)} style={{margin:'6px 4px 2px',height:30,border:'none',borderRadius:7,background:'var(--acc)',color:'white',fontSize:12,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}><V d={IC.git} s={13} stroke="white"/>Review &amp; commit</button>}
                    {committed&&<div style={{margin:'6px 4px 2px',padding:'7px',borderRadius:7,background:'var(--okDim)',border:'1px solid rgba(67,181,129,0.3)',fontSize:11.5,color:'var(--ok)',fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}><V d={IC.check} s={13} stroke="var(--ok)"/>Committed &amp; pushed</div>}
                  </div>}
            </Section>
          </div>
        </div>}

        {/* CENTER */}
        <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,borderRight:panels.right?'1px solid var(--b0)':'none'}}>
          <div style={{height:34,borderBottom:'1px solid var(--b0)',background:'var(--bg1)',display:'flex',alignItems:'center',paddingLeft:6,flexShrink:0}}>
            {[['browser','Interactive Browser',IC.globe],['execution','Execution',IC.run],['debug','Debug',IC.bug],['code','Code / Diff',IC.diff]].map(([id,label,icon])=>(
              <button key={id} onClick={()=>setCenterTab(id)} style={{display:'flex',alignItems:'center',gap:6,height:34,padding:'0 13px',border:'none',borderBottom:'2px solid '+(centerTab===id?'var(--acc)':'transparent'),background:'transparent',color:centerTab===id?'var(--t0)':'var(--t2)',fontSize:12,fontWeight:centerTab===id?600:500}}>
                <V d={icon} s={13}/>{label}{id==='execution'&&exec.result==='fail'&&<span style={{width:6,height:6,borderRadius:'50%',background:'var(--err)'}}/>}
              </button>
            ))}
          </div>
          <div style={{flex:1,overflow:'hidden',minHeight:0,display:'flex'}}>
            {centerTab==='browser'&&<BrowserView phase={phase} hl={hl}/>}
            {centerTab==='execution'&&<ExecutionView exec={exec} run={run}/>}
            {centerTab==='debug'&&<DebugView/>}
            {centerTab==='code'&&<CodeDiffView applied={applied}/>}
          </div>
        </div>

        {/* RIGHT — AI STUDIO */}
        {panels.right&&<AIStudio prompt={prompt} setPrompt={setPrompt} phase={phase} steps={steps} studioView={studioView} setStudioView={setStudioView} generate={generate} applied={applied} apply={apply} reset={reset} totalConf={totalConf} go={go}/>}
      </div>

      {panels.bottom&&<div style={{height:152,flexShrink:0,borderTop:'1px solid var(--b0)',background:'var(--bg0)',display:'flex',flexDirection:'column'}}>
        <div style={{height:30,display:'flex',alignItems:'center',paddingLeft:6,borderBottom:'1px solid var(--b0)',flexShrink:0}}>
          {[['logs','Execution Logs'],['console','Console'],['reasoning','AI Reasoning'],['git','Git Activity']].map(([id,label])=>(

          ))}
          <div style={{flex:1}}/>
          <span style={{fontSize:10.5,color:'var(--t2)',fontFamily:'var(--mono)',paddingRight:12}}>local · {project.framework} {project.fwVer}</span>
        </div>
        <div ref={logRef} style={{flex:1,overflowY:'auto',padding:'8px 12px',fontFamily:'var(--mono)',fontSize:11.5,lineHeight:'18px'}}>
          {bottomTab==='reasoning'
            ? (logs.length===0?<span style={{color:'var(--t2)'}}>AI reasoning trace will appear here when you author a test.</span>
              : logs.map((l,i)=><div key={i} style={{color:l.t==='ok'?'var(--ok)':l.t==='err'?'var(--err)':l.t==='step'?'var(--ai)':l.t==='run'?'var(--t1)':'var(--t1)',animation:'fadeIn .3s ease'}}>{l.t==='ai'&&<span style={{color:'var(--ai)'}}>✦ </span>}{l.t==='step'&&<span style={{color:'var(--ai)'}}>↳ </span>}{l.m}</div>))
            : bottomTab==='logs'
              ? (logs.filter(l=>['run','ok','err'].includes(l.t)).length===0?<span style={{color:'var(--t2)'}}>Run a test to see execution output.</span>:logs.filter(l=>['run','ok','err'].includes(l.t)).map((l,i)=><div key={i} style={{color:l.t==='ok'?'var(--ok)':l.t==='err'?'var(--err)':'var(--t1)'}}>{l.m}</div>))
              : bottomTab==='git'
                ? (gitChanges.length===0?<span style={{color:'var(--t2)'}}>No staged changes.</span>:<><div style={{color:'var(--t1)'}}>$ git status</div>{gitChanges.map((c,i)=><div key={i} style={{color:c.type==='A'?'var(--add)':'var(--mod)'}}>{c.type==='A'?'new file:':'modified:'}   {c.path}.{c.file}</div>)}{committed&&<div style={{color:'var(--ok)',marginTop:4}}>✓ committed → pushed to origin/main</div>}</>)
                : <span style={{color:'var(--t2)'}}>Browser console output (clean).</span>}
        </div>
      </div>}

      {commitOpen&&<CommitModal gitChanges={gitChanges} close={()=>setCommitOpen(false)} onCommit={()=>{setCommitOpen(false);setCommitted(true);notify('Committed & pushed to origin/main');addLog({t:'ok',m:'✓ committed & pushed to origin/main'});}}/>}
    </div>
  );
}

function renderCode(l){
  let h=(l.t||' ').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h=h.replace(/("[^"]*")/g,'<i style="color:#43B581;font-style:normal">$1</i>');
  if(l.kw)h=h.replace(/\b(public|class|void|import|package|static)\b/g,'<i style="color:#5B8CEF;font-style:normal">$1</i>');
  h=h.replace(/(@Test)/g,'<i style="color:#A472F0;font-style:normal">$1</i>');
  return <span dangerouslySetInnerHTML={{__html:h}}/>;
}

function App(){
  const [route,setRoute]=useState('welcome');
  const [projects,setProjects]=useState(PROJECTS);
  const [active,setActive]=useState(PROJECTS[0]);
  const [toast,setToast]=useState(null);
  // workspace shared state lifted so Executions/Git stay in sync
  const [gitChanges,setGitChanges]=useState([]); // {file,type,reason}
  const [runs,setRuns]=useState(EXEC_RUNS);
  const [lastRun,setLastRun]=useState(null);

  const notify=useCallback((m)=>{setToast(m);setTimeout(()=>setToast(null),2800);},[]);
  const go=useCallback((r)=>setRoute(r),[]);
  const addProject=useCallback((p)=>{setProjects(prev=>[p,...prev]);setActive(p);},[]);

  const chrome=['workspace','projects','executions','memory','settings'].includes(route);

  return (
    <div style={{width:'100vw',height:'100vh',display:'flex',overflow:'hidden',background:'var(--bg0)'}}>
      {chrome&&<ActivityRail route={route} go={go}/>}
      <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,overflow:'hidden'}}>
        {route==='welcome'&&<Welcome go={go}/>}
        {route==='create'&&<CreateProject go={go} addProject={addProject} notify={notify}/>}
        {route==='workspace'&&<Workspace go={go} project={active} notify={notify} gitChanges={gitChanges} setGitChanges={setGitChanges} setRuns={setRuns} setLastRun={setLastRun}/>}
        {route==='projects'&&<Projects go={go} projects={projects} setActive={setActive}/>}
        {route==='executions'&&<Executions go={go} runs={runs} project={active}/>}
        {route==='memory'&&<Memory go={go} project={active}/>}
        {route==='settings'&&<Settings go={go} project={active}/>}
      </div>
      {toast&&<div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',background:'var(--bg3)',border:'1px solid var(--b2)',borderRadius:9,padding:'10px 16px',fontSize:12.5,fontWeight:500,color:'var(--t0)',boxShadow:'0 14px 40px rgba(0,0,0,0.55)',zIndex:400,display:'flex',alignItems:'center',gap:9,animation:'slideU .3s ease'}}><div style={{width:6,height:6,borderRadius:'50%',background:'var(--ok)'}}/>{toast}</div>}
    </div>
  );
}
